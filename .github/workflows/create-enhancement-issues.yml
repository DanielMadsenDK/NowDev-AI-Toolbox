name: Create Enhancement Issues

# One-shot workflow: creates 9 enhancement issues then is safe to delete.
on:
  push:
    branches:
      - 'copilot/research-nowdev-ai-toolbox'

permissions:
  issues: write
  contents: read

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Create Enhancement Issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          B64_1: 
          B64_2: 
          B64_3: 
          B64_4: 
          B64_5: 
          B64_6: 
          B64_7: 
          B64_8: 
          B64_9: 
        run: |
          create_issue() {
            local title="$1"
            local b64="$2"
            echo "$b64" | base64 -d > /tmp/body.md
            existing=$(gh issue list --repo "$REPO" --search "in:title $title" --json number --jq '.[0].number' 2>/dev/null)
            if [ -n "$existing" ]; then
              echo "Already exists #$existing: $title"
            else
              url=$(gh issue create --repo "$REPO" --title "$title" --body-file /tmp/body.md)
              echo "Created: $title -> $url"
            fi
          }

          create_issue "Add NowDev-AI-ATF-Developer specialist agent for Automated Test Framework" "$B64_1"
          create_issue "Document the custom instructions file format with schema and example template" "$B64_2"
          create_issue "Expand single-file skills: add EXAMPLES.md and BEST_PRACTICES.md for AI Agent Studio, NowAssist, and Instance Scan" "$B64_3"
          create_issue "Add TypeScript build step to CI and unit tests for ArtifactParser" "$B64_4"
          create_issue "Add NowDev-AI-Pipeline-Expert agent for CI/CD and GitOps Fluent SDK workflows" "$B64_5"
          create_issue "Add 'Initialize Fluent Project' onboarding command for new workspaces" "$B64_6"
          create_issue "Add CONTRIBUTING.md and CHANGELOG.md for community contributors" "$B64_7"
          create_issue "Add structured auto-fix delegation pattern for reviewer agent findings" "$B64_8"
          create_issue "Add React UI components styling, theming, and Horizon Design System guide" "$B64_9"

          echo "Done."

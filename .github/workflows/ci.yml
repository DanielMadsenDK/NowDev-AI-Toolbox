name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile, run unit tests
        run: npm test

      - name: Validate bundled agents and skills
        run: node out/AgentValidationCli.js

      - name: Bundle extension (production)
        run: npm run bundle

      - name: Build Copilot CLI plugin
        run: npm run build:plugin

      - name: Verify plugin bundle is up to date
        run: |
          if ! git diff --exit-code -- plugins/; then
            echo "::error::plugins/ is out of date. Run 'npm run build:plugin' and commit the result."
            exit 1
          fi
